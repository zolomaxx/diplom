name: Go-CI-Pipeline

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Initialize Go Module
        run: |
          if [ ! -f go.mod ]; then
            go mod init my-app
          fi
          go mod tidy

      - name: Build Go App
        run: go build -v -o main .

      - name: Build Docker Image
        run: docker build -t my-app:latest .